    <meta charset="UTF-8" />

    <link rel="canonical" href="https://oc2.cl/" />

    <!-- Open Graph (LinkedIn, WhatsApp, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://oc2.cl/" />
    <meta property="og:title" content="OC2 | Consultoría en Comunicaciones Estratégicas" />
    <meta property="og:description" content="Consultoría especializada en comunicaciones estratégicas, gestión de crisis y asuntos públicos. Más de 20 años asesorando empresas e instituciones en Chile." />
    <meta property="og:locale" content="es_CL" />
    <meta property="og:site_name" content="OC2" />
    <meta property="og:image" content="https://oc2.cl/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OC2 | Consultoría en Comunicaciones Estratégicas" />
    <meta name="twitter:description" content="Consultoría especializada en comunicaciones estratégicas, gestión de crisis y asuntos públicos. Más de 20 años asesorando empresas e instituciones en Chile." />
    <meta name="twitter:image" content="https://oc2.cl/og-image.jpg" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "OC2 Consultoría en Comunicaciones",
      "url": "https://oc2.cl",
      "email": "info@oc2.cl",
      "telephone": "+56 2 2384 9780",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Nueva Costanera 3300, Oficina 33",
        "addressLocality": "Vitacura",
        "addressRegion": "Región Metropolitana",
        "addressCountry": "CL"
      },
      "sameAs": [
        "https://www.linkedin.com/company/oc2-consultor%C3%ADa-comunicaciones/",
        "https://www.instagram.com/oc2comunicaciones/"
      ],
      "description": "Consultoría especializada en comunicaciones estratégicas, gestión de crisis y asuntos públicos. Más de 20 años asesorando empresas e instituciones en Chile."
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Netlify Forms detection (hidden, required for SPA) -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function(user) {
          if (!user) {
            window.netlifyIdentity.on("login", function() {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
